<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>法务群自动化管理后台</title>
    <link rel="stylesheet" href="/admin/styles.css?v=20260724-21" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">法</div>
          <div>
            <div class="brand-title">法务自动化</div>
            <div class="brand-subtitle">WeCom Ops Console</div>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-item active" data-section="workbench" data-view="overview">工作台</button>
          <button class="nav-item" data-section="cases" data-view="cases">案件与群</button>
          <button class="nav-item" data-section="materials" data-view="ocr-reviews">资料处理</button>
          <button class="nav-item" data-section="reminders" data-view="reminders">提醒任务</button>
          <button class="nav-item" data-section="kdocs" data-view="kdocs-browser">金山结果</button>
          <button class="nav-item" data-section="settings" data-view="recognition-settings">系统配置</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="view-title">工作台</h1>
            <p id="view-subtitle">集中处理待办、失败任务和业务异常</p>
          </div>
          <div class="key-panel">
            <input id="api-key-input" type="password" placeholder="X-API-Key" autocomplete="off" />
            <button id="save-key-btn">保存</button>
            <button id="refresh-btn" class="ghost">刷新</button>
          </div>
        </header>

        <nav id="section-tabs" class="section-tabs" aria-label="当前业务模块"></nav>

        <section id="alert" class="alert hidden"></section>
        <section id="content"></section>
      </main>
    </div>

    <template id="empty-state-template">
      <div class="empty-state">暂无数据</div>
    </template>

    <script src="/admin/admin.js?v=20260724-21"></script>
  </body>
</html>
